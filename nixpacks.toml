# Nixpacks (Coolify). Build Pack = Nixpacks.

[variables]
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"
PORT = "3000"
NEXT_TELEMETRY_DISABLED = "1"
# Solo para prisma generate en build (no conecta a DB real)
DATABASE_URL = "postgresql://postgres:postgres@127.0.0.1:5432/factotips_db"

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "pnpm run start"
